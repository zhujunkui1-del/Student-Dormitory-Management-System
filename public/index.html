<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>宿舍管理系统</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- ==================== 登录页 ==================== -->
<div id="loginPage" class="login-container">
  <div class="login-card">
    <h1>🏠 宿舍管理系统</h1>
    <p class="subtitle">高校宿舍信息化管理平台</p>
    <div class="role-tabs">
      <button class="role-tab active" onclick="switchRole('student')">🎓 学生端</button>
      <button class="role-tab" onclick="switchRole('admin')">⚙️ 管理员端</button>
    </div>
    <div class="form-group">
      <label id="loginIdLabel">学号</label>
      <input type="text" id="loginId" placeholder="请输入学号">
    </div>
    <div class="form-group">
      <label>姓名</label>
      <input type="text" id="loginName" placeholder="请输入姓名">
    </div>
    <button class="btn btn-primary btn-block" onclick="doLogin()">登 录</button>
    <p id="loginError" style="color:var(--danger);text-align:center;margin-top:12px;font-size:13px;display:none;"></p>
  </div>
</div>

<!-- ==================== 主体布局 ==================== -->
<div id="appLayout" class="app-layout page-hidden">
  <!-- 侧边栏 -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <h2>🏠 宿舍管理</h2>
      <span class="role-badge" id="sidebarRole"></span>
    </div>
    <nav class="sidebar-nav" id="sidebarNav"></nav>
    <div class="sidebar-footer">
      <button class="btn btn-outline btn-sm btn-block" style="color:#cbd5e1;border-color:rgba(255,255,255,.3);background:transparent" onclick="doLogout()">退出登录</button>
    </div>
  </aside>

  <!-- 主内容区 -->
  <main class="main-content" id="mainContent"></main>
</div>

<!-- 全局Modal -->
<div class="modal-overlay" id="globalModal">
  <div class="modal" id="globalModalContent"></div>
</div>

<!-- Toast容器 -->
<div class="toast-container" id="toastContainer"></div>

<script src="/js/app.js"></script>
</body>
</html>
